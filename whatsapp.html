<style>

/* RESET */

body{

/* 🔥 MOBILE LIBERA SCROLL */

/* ================= SIDEBAR ================= */

.sidebar{
width:380px;
background:var(--sidebar);

flex-direction:column;
}

/* HEADER */

.header{
padding:20px;

color:#111827;

}

/* SEARCH */

.search{

/* CLIENT LIST */

.client{

/* PAUSADO */

/* AVATAR */

.menuDots:hover{

}

.menuDots:active{

position:absolute;
background:white;
border:1px solid var(--border);
border-radius:10px;
padding:6px;
display:none;
flex-direction:column;
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.menu button{

border:none;
color:#111827;

text-align:left;

}

.menu button:hover{
background:#f3f4f6;
}

/* ================= CHAT ================= */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:var(--chat);
}

/* HEADER CHAT */

.chat-header{
padding:18px 22px;
border-bottom:1px solid #334155;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.chat-title{

font-size:15px;
}

/* BOTÕES */

button{
padding:8px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

/* ================= MENSAGENS ================= */

.messages{
flex:1;
overflow:auto;
padding:28px;
display:flex;
flex-direction:column;
gap:16px;
}

/* BOLHAS */

.msg{
max-width:60%;

font-size:14px;

}

.user{

align-self:flex-start;

}

.assistant{

color:white;

/* TIME */

.time{
font-size:11px;

opacity:.6;

}

/* EMPTY */

.empty{
margin:auto;
opacity:.5;
font-size:14px;

/* ANIMAÇÃO */

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)
let pagina = 0
const limite = 20
let carregando = false
/* realtime bot */

db
.channel("controle_bot_changes")
.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"controle_bot"
},
payload=>{
  atualizarClientesSilencioso()
}
)
.subscribe()

/* ================= GLOBAL ================= */

let nomes = {}
let clienteSelecionado = null

/* ================= CARREGAR CLIENTES ================= */

async function carregarClientes(){
const {data} = await db
.from("conversas_whatsapp")
.select("*")
.order("created_at",{ascending:false})

const {data:memoria} = await db
.from("memoria_clientes")
.select("telefone,nome")

/* 🔥 CORREÇÃO DO NOMES */

nomes = {}

memoria.forEach(c=>{
  nomes[c.telefone] = c.nome
})

/* AGRUPAR CLIENTES */

const map = {}

data.forEach(m=>{
  if(!map[m.telefone]) map[m.telefone] = m
})

const clientes = Object.values(map)

/* RENDER */

const container = document.getElementById("clientes")
container.innerHTML = ""

for (const c of clientes){

const div = document.createElement("div")
div.setAttribute("data-telefone", c.telefone)
  const inicial = c.telefone.slice(-2)

  const pausado = await verificarPausa(c.telefone)

  div.className = pausado ? "client pausado" : "client"

const date = new Date(c.created_at + "Z")
  const hora = date.toLocaleTimeString("pt-BR",{
  hour:"2-digit",
  minute:"2-digit",
  timeZone:"America/Bahia"
})

div.innerHTML = `
<div class="avatar">
  <img 
    src="https://ui-avatars.com/api/?name=${nomes[c.telefone] || c.telefone}&background=25d366&color=fff&size=128"
    style="width:100%;height:100%;border-radius:50%">
</div>

<div style="flex:1">

<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div class="phone">
      ${nomes[c.telefone] || c.telefone}
    </div>
  </div>

  <div class="preview">${c.mensagem}</div>

<div style="display:flex;align-items:flex-end">

  <div class="status ${pausado?'off':'on'}">
    ● ${pausado?'BOT PAUSADO':'BOT ATIVO'}
  </div>

  <div style="margin-left:auto;margin-right:6px">
    <div class="hora" style="font-size:11px;color:#6b7280">
      ${hora}
    </div>
  </div>

</div>




</div>

${c.role === "user" ? '<div class="notificacao"></div>' : ''}

<div class="menuDots"
onclick="event.stopPropagation(); abrirMenu(event,'${c.telefone}')">
⋮
</div>
`

  /* 🔥 CLICK CORRETO */

div.addEventListener("click", () => {
if(window.innerWidth <= 768){
window.location.href = "chat.html?telefone=" + c.telefone
return
}

  // 💻 Se for desktop → iframe normal
  abrirChatIframe(c.telefone)

})

  container.appendChild(div)
}



}

/* ================= ABRIR CHAT ================= */


async function abrirConversa(telefone){

clienteSelecionado = telefone
pagina = 0
acabou = false
const container = document.getElementById("mensagens")
container.innerHTML = ""

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:false})
.range(0, limite-1)

if(!data || data.length === 0){
const empty = document.createElement("div")
empty.className="empty"
empty.innerText="Nenhuma mensagem ainda"
container.appendChild(empty)
return
}

const mensagens = data.reverse()
mensagens.forEach(m=>renderMensagem(m))

setTimeout(()=>{
container.scrollTop = container.scrollHeight
},50)

ativarScroll()

/* 🔥 ISSO TEM QUE FICAR AQUI DENTRO */

const pausado = await verificarPausa(telefone)

if(!pausado){
  sendBox.style.opacity = "0.5"
  sendBox.style.pointerEvents = "none"
}else{
  sendBox.style.opacity = "1"
  sendBox.style.pointerEvents = "auto"
}}
async function excluirSelecionadas(){

if(selecionadas.length===0){
alert("Selecione mensagens")
return
}

if(!confirm("Excluir mensagens selecionadas?")) return

await db
.from("conversas_whatsapp")
.delete()
.in("id",selecionadas)

abrirConversa(telefone)
}

async function excluirConversa(){

if(!clienteSelecionado) return

if(!confirm("⚠️ Tem certeza que deseja excluir TODA a conversa?\nEssa ação não pode ser desfeita.")) return
await db
.from("conversas_whatsapp")
.delete()
.eq("telefone",clienteSelecionado)

document.getElementById("mensagens").innerHTML='<div class="empty">Conversa excluída</div>'

// 🔥 REMOVE DA TELA DIRETO
const card = document.querySelector(`[data-telefone="${clienteSelecionado}"]`)
if(card){
  card.remove()
}
}

document.getElementById("buscar").addEventListener("input",function(){

const filtro=this.value.toLowerCase()

document.querySelectorAll(".client").forEach(c=>{

const texto=c.innerText.toLowerCase()

c.style.display=texto.includes(filtro)?"flex":"none"

})

})


carregarClientes()
function abrirRepertorio(){

const frame = document.getElementById("frameRepertorio")

if(!frame.src){
frame.src="prompt.html"
}

document.getElementById("popupRepertorio").style.display="flex"

}
function fecharRepertorio(){

}

}


/* MENU */

function abrirMenu(e, telefone){

e.stopPropagation()

const overlay = document.getElementById("menuOverlay")
const box = document.getElementById("menuBox")

overlay.style.display = "flex"

/* 🔥 DADOS DO CONTATO */
const nome = nomes[telefone] || "Sem nome"
const numero = telefone

verificarPausa(telefone).then(pausado=>{

box.innerHTML = `

<!-- HEADER CONTATO -->
<div class="menuHeader">
  <div class="menuAvatar">${telefone.slice(-2)}</div>
  <div>
    <div class="menuNome">${nome}</div>
    <div class="menuNumero">${numero}</div>
  </div>
</div>

<!-- AÇÕES -->
<button class="menuAction" onclick="editarContato('${telefone}')">
✏️ Editar contato
</button>

<button class="menuAction ${pausado ? 'menuAtivar' : 'menuDesativar'}"
onclick="toggleBot('${telefone}'); fecharMenu()">
${pausado ? "▶️ Ativar BOT" : "⛔ Desativar BOT"}
</button>

<!-- 🔥 NOVO BOTÃO -->
<button class="menuAction menuDesativar"
onclick="clienteSelecionado='${telefone}'; excluirConversa(); fecharMenu()">
Excluir conversa
</button>

<button class="menuCancel" onclick="fecharMenu()">
Cancelar
</button>

`

})

}

  function fecharMenu(){
document.getElementById("menuOverlay").style.display = "none"
}

setTimeout(()=>{
const overlay = document.getElementById("menuOverlay")

overlay.addEventListener("click", function(e){
if(e.target.id === "menuOverlay"){
fecharMenu()
}
})
},0)
  
  


/* VERIFICAR PAUSA */

async function verificarPausa(telefone){

const {data,error} = await db
.from("controle_bot")
.select("pausado")
.eq("telefone",telefone)
.limit(1)
.maybeSingle()

if(error) return false

return data?.pausado === true

}

/* TOGGLE BOT */

async function toggleBot(telefone){

const {data,error} = await db
.from("controle_bot")
.select("pausado")
.eq("telefone",telefone)
.limit(1)
.maybeSingle()

if(error){
console.error(error)
return
}

const novoStatus = !(data?.pausado === true)

if(data){

await db
.from("controle_bot")
.update({pausado:novoStatus})
.eq("telefone",telefone)

}else{

await db
.from("controle_bot")
.insert({
telefone:telefone,
pausado:true
})

}

// 🔥 ATUALIZA SÓ O CARD
const card = document.querySelector(`[data-telefone="${telefone}"]`)

if(card){

  const pausado = novoStatus

  card.classList.toggle("pausado", pausado)

  const statusEl = card.querySelector(".status")

  if(statusEl){
    statusEl.innerHTML = `● ${pausado?'BOT PAUSADO':'BOT ATIVO'}`
    statusEl.className = "status " + (pausado ? "off" : "on")
  }

}
}


async function enviarManual(){

if(!clienteSelecionado){
alert("Selecione um cliente")
return
}

const textarea = document.getElementById("msgManual")
const msg = textarea.value.trim()

if(!msg){
alert("Digite uma mensagem")
return
}

const telefone = clienteSelecionado.replace(/\D/g,"").trim()

try {

const res = await fetch("/api/send", {
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify({
    telefone,
    mensagem:msg
  })
})

const data = await res.json()

if(!res.ok){
  alert("Erro: " + JSON.stringify(data))
  return
}

/* ✅ SALVA NO BANCO (IMPORTANTE) */

await db.from("conversas_whatsapp").insert({
  telefone: telefone,
  mensagem: msg,
  role: "assistant"
})

textarea.value = ""

/* atualiza chat */
abrirChatIframe(telefone)
} catch (err){
alert("Erro ao enviar: " + err.message)
}

}
function falarComAgente(){

abrirIframe("agente.html")

document.getElementById("popupRepertorio").style.display="flex"

}

async function editarContato(telefone){

const {data} = await db
.from("memoria_clientes")
.select("nome")
.eq("telefone",telefone)
.maybeSingle()

const nomeAtual = data?.nome || ""

const novoNome = prompt("Editar nome do contato:",nomeAtual)

if(!novoNome) return

if(data){

await db
.from("memoria_clientes")
.update({nome:novoNome})
.eq("telefone",telefone)

}else{

await db
.from("memoria_clientes")
.insert({
telefone:telefone,
nome:novoNome
})

}

const card = document.querySelector(`[data-telefone="${telefone}"]`)

if(card){
  const phoneEl = card.querySelector(".phone")
  if(phoneEl){
    phoneEl.innerText = novoNome
  }
}
if(clienteSelecionado === telefone){
abrirChatIframe(telefone)}

}


function renderMensagem(m){

const container = document.getElementById("mensagens")

const div = document.createElement("div")

div.className = "msg " + (m.role === "assistant" ? "assistant" : "user")

const date = new Date(m.created_at)

const dataFormatada = date.toLocaleDateString("pt-BR",{
timeZone:"America/Bahia"
})

const horaFormatada = date.toLocaleTimeString("pt-BR",{
hour:"2-digit",
minute:"2-digit",
timeZone:"America/Bahia"
})

div.innerHTML = `
<div>${m.mensagem}</div>
<div class="time">${dataFormatada} • ${horaFormatada}</div>
`

container.appendChild(div)

}


function ativarScroll(){

const container = document.getElementById("mensagens")

container.onscroll = async () => {

if(container.scrollTop < 50 && !carregando){
carregando = true
pagina++

const inicio = pagina * limite
const fim = inicio + limite - 1

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",clienteSelecionado)
.order("created_at",{ascending:false})
.range(inicio, fim)

if(data && data.length){

const antigas = data.reverse()

const alturaAntes = container.scrollHeight

antigas.forEach(m=>{

const div = document.createElement("div")

div.className = "msg " + (m.role === "assistant" ? "assistant" : "user")

const date = new Date(m.created_at)

div.innerHTML = `
<div>${m.mensagem}</div>
<div class="time">
${date.toLocaleTimeString("pt-BR",{
  hour:"2-digit",
  minute:"2-digit",
  timeZone:"America/Bahia"
})}
</div>
`

container.prepend(div)

})

/* mantém posição do scroll */

setTimeout(()=>{
container.scrollTop = container.scrollHeight - alturaAntes
},0)

}

carregando = false

}

}

}

const sendBox = document.getElementById("sendBox")

if(sendBox){

 let atualizando = false

async function atualizarClientesSilencioso(){

  if(atualizando) return
  atualizando = true

  try{

    const container = document.getElementById("clientes")

    const {data} = await db
    .from("conversas_whatsapp")
.select("telefone,mensagem,created_at,role")
      .order("created_at",{ascending:false})
    .limit(50) // 🔥 evita travamento

    const {data:memoria} = await db
    .from("memoria_clientes")
    .select("telefone,nome")

    /* nomes */
    const nomesTemp = {}
    memoria.forEach(c=>{
      nomesTemp[c.telefone] = c.nome
    })

    /* agrupar */
    const map = {}
    data.forEach(m=>{
      if(!map[m.telefone]) map[m.telefone] = m
    })

    const clientes = Object.values(map)

    /* 🔥 LOOP CORRETO (SEM forEach async) */
    for(const c of clientes){

      let card = document.querySelector(`[data-telefone="${c.telefone}"]`)

      const pausado = await verificarPausa(c.telefone)
      const nome = nomesTemp[c.telefone] || c.telefone

      /* 🔥 SE NÃO EXISTE → IGNORA (NÃO CRIA) */
      if(!card) continue

      /* 🔥 ATUALIZA SEM RECRIAR */
      const phoneEl = card.querySelector(".phone")
      const previewEl = card.querySelector(".preview")
      const statusEl = card.querySelector(".status")
      const date = new Date(c.created_at + "Z")

const hora = date.toLocaleTimeString("pt-BR",{
  hour:"2-digit",
  minute:"2-digit",
  timeZone:"America/Bahia"
})

const horaEl = card.querySelector(".hora")

if(horaEl){
  horaEl.innerText = hora
}
      if(phoneEl && phoneEl.innerText !== nome){
        phoneEl.innerText = nome
      }

if(
  previewEl &&
  previewEl.innerText !== c.mensagem
){

  previewEl.innerText = c.mensagem

  // 🔴 CONTROLE DA BOLINHA
  let notif = card.querySelector(".notificacao")

  if(c.role === "user"){
    if(!notif){
      const dot = document.createElement("div")
      dot.className = "notificacao"
      card.appendChild(dot)
    }
  } else {
    if(notif) notif.remove()
  }

}{

  
  previewEl.innerText = c.mensagem

  // 🔥 PISCAR IGUAL WHATSAPP
  card.style.transition = "0.3s"
  card.style.background = "#bbf7d0"

  setTimeout(()=>{
    card.style.background = "#dcfce7"
  },150)

  setTimeout(()=>{
    card.style.background = ""
  },600)

  // 🔥 LEVE PULO
  card.style.transform = "scale(1.02)"

  setTimeout(()=>{
    card.style.transform = "scale(1)"
  },200)

}

      if(statusEl){
        statusEl.innerHTML = `● ${pausado?'BOT PAUSADO':'BOT ATIVO'}`
        statusEl.className = "status " + (pausado ? "off" : "on")
      }

    }

  }catch(err){
    console.error("Erro atualização:", err)
  }

  atualizando = false
}

/* ================= INTERVALO ================= */

setInterval(() => {
  atualizarClientesSilencioso()
}, 2000)
window.addEventListener("popstate", () => {

  // 🔥 quando voltar
  document.getElementById("frameChat").src = ""
  document.getElementById("clienteAtual").innerText = "Selecione um cliente"

})
  
window.addEventListener("pageshow", () => {

  console.log("⚡ Voltou para a tela")

  // 🔥 NÃO recria tudo
  // 🔥 só atualiza o que mudou
  atualizarClientesSilencioso()

})
