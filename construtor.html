<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dev AI • Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
display:flex;
height:100vh;
overflow:hidden;
background:#0f172a;
}

/* CHAT */
.chat-area{
width:30%;
min-width:300px;
background:#020617;
color:#fff;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{background:#2563eb;align-self:flex-end}
.bot{background:#111827;align-self:flex-start}

.input{
display:flex;
padding:10px;
gap:5px;
}

textarea{
flex:1;
height:40px;
border:none;
border-radius:8px;
padding:10px;
}

button{
background:#2563eb;
border:none;
color:#fff;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* PREVIEW */
.preview-area{
flex:1;
display:flex;
flex-direction:column;
background:#e2e8f0;
}

.preview-top{
padding:10px;
background:#fff;
display:flex;
gap:10px;
}

.preview-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* EDITOR */
.editor{
height:200px;
width:100%;
border:none;
font-family:monospace;
padding:10px;
}

</style>

</head>
<body>

<!-- CHAT -->
<div class="chat-area">

<div id="chat" class="chat"></div>

<div class="input">
<textarea id="msg"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

</div>

<!-- PREVIEW -->
<div class="preview-area">

<div class="preview-top">
<button onclick="modo('desktop')">💻</button>
<button onclick="modo('mobile')">📱</button>
</div>

<div class="preview-container">
<iframe id="preview"></iframe>
</div>

<textarea id="editor" class="editor"></textarea>

<button onclick="manual()">Atualizar manual</button>

</div>

<script>

const TOKEN = "mercatto_admin_2026"

/* MEMORIA */
let chatMemoria = JSON.parse(localStorage.getItem("chat")) || []
let codigoAtual = localStorage.getItem("codigo") || ""

/* CHAT */
function addMsg(role,text){

const chat = document.getElementById("chat")

const div = document.createElement("div")
div.className = "msg " + (role==="user"?"user":"bot")
div.innerHTML = text

chat.appendChild(div)
chat.scrollTop = chat.scrollHeight

chatMemoria.push({role,text})
localStorage.setItem("chat", JSON.stringify(chatMemoria))

}

/* CARREGAR */
function carregarChat(){

chatMemoria.forEach(m=>{
const div = document.createElement("div")
div.className = "msg " + (m.role==="user"?"user":"bot")
div.innerHTML = m.text
document.getElementById("chat").appendChild(div)
})

}

/* PREVIEW */
function atualizarPreview(html){

codigoAtual = html
localStorage.setItem("codigo", html)

const iframe = document.getElementById("preview")

html = html
.replace(/window\.open/gi,"")
.replace(/location\.href/gi,"")

const doc = iframe.contentWindow.document
doc.open()
doc.write(html)
doc.close()

document.getElementById("editor").value = html

}

/* ENVIAR */
async function enviar(){

const texto = document.getElementById("msg").value.trim()
if(!texto) return

addMsg("user",texto)
document.getElementById("msg").value=""

addMsg("bot","⏳...")

try{

const res = await fetch("/api/construtor",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+TOKEN
},
body:JSON.stringify({
projeto:"default",
pergunta:texto
})
})

const data = await res.json()

document.querySelector(".bot:last-child").remove()

addMsg("bot", data.resposta || "Erro")

if(data.preview){
atualizarPreview(data.preview)
}

}catch(e){

document.querySelector(".bot:last-child").remove()
addMsg("bot","Erro")

}

}

/* MANUAL */
function manual(){
const code = document.getElementById("editor").value
atualizarPreview(code)
}

/* INIT */
window.onload = () => {

carregarChat()

if(codigoAtual){
atualizarPreview(codigoAtual)
}

}

</script>

</body>
</html>
