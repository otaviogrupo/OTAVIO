<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dev AI • Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
display:flex;
height:100vh;
overflow:hidden;
background:#0f172a;
}

/* ================= CHAT ================= */

.chat-area{
width:32%;
min-width:320px;
background:#020617;
color:#fff;
display:flex;
flex-direction:column;
border-right:1px solid #1e293b;
}

.chat-header{
padding:15px;
font-weight:600;
background:#020617;
border-bottom:1px solid #1e293b;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px;
border-radius:12px;
max-width:85%;
font-size:14px;
line-height:1.4;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.bot{
align-self:flex-start;
background:#111827;
}

.input{
display:flex;
gap:8px;
padding:12px;
background:#020617;
border-top:1px solid #1e293b;
}

textarea{
flex:1;
height:42px;
border-radius:8px;
border:none;
padding:10px;
resize:none;
}

button{
background:#2563eb;
border:none;
color:#fff;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

/* ================= PREVIEW ================= */

.preview-area{
flex:1;
display:flex;
flex-direction:column;
background:#e2e8f0;
}

.preview-top{
padding:10px;
background:#fff;
display:flex;
gap:10px;
border-bottom:1px solid #ccc;
}

.preview-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.frame{
border:1px solid #ccc;
background:#fff;
}

/* desktop */
.frame.desktop{
width:100%;
height:100%;
}

/* mobile */
.frame.mobile{
width:375px;
height:667px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.status{
font-size:12px;
color:#64748b;
margin-left:auto;
align-self:center;
}

</style>

</head>
<body>

<!-- CHAT -->
<div class="chat-area">

<div class="chat-header">
💻 Dev AI • Agente N2
</div>

<div id="chat" class="chat"></div>

<div class="input">
<textarea id="msg" placeholder="Ex: corrige esse código"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

</div>

<!-- PREVIEW -->
<div class="preview-area">

<div class="preview-top">
<button onclick="modo('desktop')">💻 Desktop</button>
<button onclick="modo('mobile')">📱 Mobile</button>
<div id="status" class="status">Pronto</div>
</div>

<div class="preview-container">
<iframe id="preview" class="frame desktop"
sandbox="allow-scripts allow-forms allow-same-origin">
</iframe>
</div>

</div>

<script>

const TOKEN = "mercatto_admin_2026"

/* ================= CHAT ================= */

function addMsg(role,text){

const chat = document.getElementById("chat")

const div = document.createElement("div")
div.className = "msg " + (role==="user"?"user":"bot")
div.innerHTML = text

chat.appendChild(div)
chat.scrollTop = chat.scrollHeight
}

/* ================= STATUS ================= */

function setStatus(txt){
document.getElementById("status").innerText = txt
}

/* ================= MODO ================= */

function modo(tipo){
const iframe = document.getElementById("preview")
iframe.className = "frame " + tipo
}

/* ================= PREVIEW (BLINDADO) ================= */

function atualizarPreview(html){

const iframe = document.getElementById("preview")

if(!iframe) return

// 🔥 BLOQUEIO TOTAL DE REDIRECIONAMENTO
html = html
.replace(/window\.open\([^)]*\)/gi, "")
.replace(/window\.location\s*=\s*[^;]+/gi, "")
.replace(/location\.href\s*=\s*[^;]+/gi, "")
.replace(/top\.location\s*=\s*[^;]+/gi, "")

// 🔥 FORÇA BASE (evita quebrar caminhos)
const base = `<base href="${location.origin}/">`

const finalHTML = `
<html>
<head>${base}</head>
<body>
${html}
</body>
</html>
`

const doc = iframe.contentWindow.document
doc.open()
doc.write(finalHTML)
doc.close()

}

/* ================= ENVIAR ================= */

async function enviar(){

const input = document.getElementById("msg")
const texto = input.value.trim()

if(!texto) return

addMsg("user",texto)
input.value=""

setStatus("Processando...")

const loading = document.createElement("div")
loading.className="msg bot"
loading.innerHTML="⏳ Pensando..."
document.getElementById("chat").appendChild(loading)

try{

const res = await fetch("/api/construtor",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + TOKEN
},
body:JSON.stringify({
projeto:"default",
pergunta:texto
})
})

const data = await res.json()

loading.remove()

addMsg("bot", data.resposta || "Erro")

if(data.preview){
atualizarPreview(data.preview)
setStatus("Preview atualizado")
}else{
setStatus("Sem preview")
}

}catch(e){

loading.remove()
addMsg("bot","❌ erro na API")
setStatus("Erro")

}

}

/* ENTER */
document.getElementById("msg").addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
enviar()
}
})

</script>

</body>
</html>
