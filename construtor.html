<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dev AI • Chat N2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#e5ddd5;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#fff;
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid #ddd;
}

.avatar{
width:40px;height:40px;border-radius:50%;
background:#2563eb;color:#fff;
display:flex;align-items:center;justify-content:center;
font-weight:600;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:80%;
padding:10px;
border-radius:10px;
font-size:14px;
}

.user{align-self:flex-end;background:#dcf8c6}
.bot{align-self:flex-start;background:#fff}

.time{
font-size:10px;
color:#666;
margin-top:5px;
text-align:right;
}

.input{
display:flex;
gap:8px;
padding:10px;
background:#f0f2f5;
}

textarea{
flex:1;
border-radius:20px;
padding:10px;
border:1px solid #ddd;
resize:none;
height:40px;
}

button{
background:#2563eb;
border:none;
color:#fff;
padding:10px;
border-radius:20px;
cursor:pointer;
}

.top-bar{
display:flex;
gap:10px;
padding:10px;
background:#f0f2f5;
border-bottom:1px solid #ddd;
}

input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">
<div class="avatar">DEV</div>
<div>
<b>Agente Dev N2</b><br>
<small>online</small>
</div>
</div>

<div class="top-bar">
<input id="projeto" placeholder="Projeto">
<input id="arquivo" placeholder="Arquivo (opcional)">
</div>

<div id="chat" class="chat"></div>

<div class="input">
<textarea id="msg" placeholder="Ex: corrige erro nessa api"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

<script>

const TOKEN = "mercatto_admin_2026"

function hora(){
const d=new Date()
return d.getHours()+":"+d.getMinutes()
}

function addMsg(role,text){

const chat=document.getElementById("chat")

const div=document.createElement("div")
div.className="msg "+(role==="user"?"user":"bot")

div.innerHTML=`
${text}
<div class="time">${hora()}</div>
`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

/* ================= AGENTE ================= */

async function enviar(){

const texto=document.getElementById("msg").value.trim()
if(!texto) return

const projeto=document.getElementById("projeto").value

addMsg("user",texto)
document.getElementById("msg").value=""

/* typing */
const typing=document.createElement("div")
typing.className="msg bot"
typing.innerHTML="Pensando..."
document.getElementById("chat").appendChild(typing)

try{

const res=await fetch("/api/construtor",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+TOKEN
},
body:JSON.stringify({
projeto,
pergunta:texto
})
})

const data=await res.json()

typing.remove()

if(data.tipo==="alteracao"){
addMsg("bot","🛠️ Código atualizado: "+data.descricao)
}

else if(data.tipo==="criacao"){
addMsg("bot","📦 Novo arquivo criado: "+data.arquivo)
}

else{
addMsg("bot",data.resposta || "Erro")
}

}catch(e){
typing.remove()
addMsg("bot","❌ erro na API")
}

}

/* ENTER */
document.getElementById("msg").addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
enviar()
}
})

</script>

</body>
</html>
