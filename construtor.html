<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dev AI • Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
display:flex;
height:100vh;
overflow:hidden;
}

/* CHAT */
.chat-area{
width:35%;
min-width:320px;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:80%;
font-size:14px;
}

.user{align-self:flex-end;background:#2563eb}
.bot{align-self:flex-start;background:#222}

.input{
display:flex;
gap:5px;
padding:10px;
background:#000;
}

textarea{
flex:1;
height:40px;
border-radius:8px;
border:none;
padding:10px;
resize:none;
}

button{
background:#2563eb;
border:none;
color:#fff;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* PREVIEW */
.preview-area{
flex:1;
background:#e5e7eb;
display:flex;
flex-direction:column;
}

/* TOPO */
.preview-top{
padding:10px;
background:#fff;
display:flex;
gap:10px;
border-bottom:1px solid #ddd;
}

.preview-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

/* FRAME */
.frame{
border:1px solid #ccc;
background:#fff;
}

/* MODOS */
.frame.desktop{
width:100%;
height:100%;
}

.frame.mobile{
width:375px;
height:667px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* RESPONSIVO */
@media(max-width:900px){
.chat-area{width:100%}
.preview-area{display:none}
}

</style>

</head>
<body>

<!-- CHAT -->
<div class="chat-area">

<div id="chat" class="chat"></div>

<div class="input">
<textarea id="msg" placeholder="Ex: corrige esse código"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

</div>

<!-- PREVIEW -->
<div class="preview-area">

<div class="preview-top">
<button onclick="modo('desktop')">💻 Desktop</button>
<button onclick="modo('mobile')">📱 Mobile</button>
</div>

<div class="preview-container">
  <iframe id="preview" class="frame desktop"></iframe>
</div>

</div>

<script>

const TOKEN = "mercatto_admin_2026"

/* CHAT */
function addMsg(role,text){

const chat = document.getElementById("chat")

const div = document.createElement("div")
div.className = "msg " + (role==="user"?"user":"bot")
div.innerHTML = text

chat.appendChild(div)
chat.scrollTop = chat.scrollHeight
}

/* MODO */
function modo(tipo){

const iframe = document.getElementById("preview")
iframe.className = "frame " + tipo

}

/* PREVIEW */
function atualizarPreview(html){

const iframe = document.getElementById("preview")

if(!iframe){
  console.error("iframe não encontrado")
  return
}

const doc = iframe.contentWindow.document

doc.open()
doc.write(html)
doc.close()

}

/* ENVIAR */
async function enviar(){

const input = document.getElementById("msg")
const texto = input.value.trim()

if(!texto) return

addMsg("user",texto)
input.value=""

/* loading */
const loading = document.createElement("div")
loading.className = "msg bot"
loading.innerHTML = "⏳ Processando..."
document.getElementById("chat").appendChild(loading)

try{

const res = await fetch("/api/construtor",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + TOKEN
},
body:JSON.stringify({
projeto:"default",
pergunta:texto
})
})

const data = await res.json()

loading.remove()

/* MOSTRA RESPOSTA */
addMsg("bot", data.resposta || "Erro")

/* ATUALIZA PREVIEW SEMPRE */
if(data.preview){
  atualizarPreview(data.preview)
}

}catch(e){

loading.remove()
addMsg("bot","❌ erro na API")

}

}

/* ENTER */
document.getElementById("msg").addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
enviar()
}
})

</script>

</body>
</html>
